name: Cosmos
type: theme
description: 'Second generation common theme for the Scitalk distro'
core: 8.x
base theme: stable
core_version_requirement: ^10 || ^11

libraries:
 - cosmos/global
 - cosmos/video-player

libraries-override:
  dark_mode_toggle/dark-mode-toggle: cosmos/dark-mode-toggle

regions:
  header: 'Header'
  sidebar: 'Left sidebar'
  admin: 'Admin tools'
  page_title: 'Page Title'
  content: 'Content'
  footer: 'Footer'
  footer_bottom: 'Footer bottom'
